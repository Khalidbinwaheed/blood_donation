# Build Android APK in the cloud (no local Flutter/Android SDK needed).
# Download the APK from: GitHub repo → Actions → latest run → Artifacts
#
# Optional release signing — add these GitHub repo secrets:
#   ANDROID_KEYSTORE_BASE64  (base64 of your .jks file)
#   ANDROID_KEYSTORE_PASSWORD
#   ANDROID_KEY_ALIAS
#   ANDROID_KEY_PASSWORD
#
# Optional env defines — add these GitHub repo secrets:
#   GOOGLE_MAPS_API_KEY
#   GOOGLE_WEB_CLIENT_ID

name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    tags: ['v*']

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Decode release keystore
        if: env.HAS_KEYSTORE == 'true'
        env:
          HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Build release APK
        if: env.HAS_KEYSTORE == 'true'
        env:
          HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          flutter build apk --release \
            --dart-define=GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }} \
            --dart-define=GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }} \
            --dart-define=USE_CLOUD_CHAT=true \
            --dart-define=GITHUB_MODELS_MODEL=openai/gpt-4.1-mini

      - name: Build debug APK (no keystore configured)
        if: env.HAS_KEYSTORE != 'true'
        run: |
          echo "No ANDROID_KEYSTORE_BASE64 secret — building debug APK for testing."
          flutter build apk --debug \
            --dart-define=USE_CLOUD_CHAT=true \
            --dart-define=GITHUB_MODELS_MODEL=openai/gpt-4.1-mini

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lifeline-apk
          path: |
            build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
          retention-days: 30
